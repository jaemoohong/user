name: Deploy to Dev

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: user
  AWS_ACCOUNT_ID: 762921032637

jobs:
  build-and-deploy:
    runs-on: arc-runner-set
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Build Go binary
        run: |
          go build -o main ./main.go

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}


      - name: Set IMAGE_TAG
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_URL=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_URL }}

      - name: Update dev/deploy.yaml with new image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          sed -i "s|image: .*|image: $IMAGE_URL|g" dev/deploy.yaml
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_URL: ${{ env.IMAGE_URL }}

      - name: Commit updated deploy.yaml
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add dev/deploy.yaml
          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commits"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
          
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Trigger Argo CD sync
        run: |
          argocd login argo-cd-argocd-server.default --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure --grpc-web
          argocd app sync dev-user --insecure --grpc-web
