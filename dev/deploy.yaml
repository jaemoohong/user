apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-deploy
  template:
    metadata:
      labels:
        app: user-deploy
    spec:
      containers:
        - name: user-deploy
          image: user-deploy:latest
          ports:
            - containerPort: 8080